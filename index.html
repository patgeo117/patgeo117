<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="George Patiño - Web and Mobile Developer Portfolio">
    <title>George Patiño</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f4f4f9;
            --header-bg: #1f1f1f;
            --primary-color: #00bcd4;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #121212;
            --header-bg: #f0f0f0;
            --primary-color: #007b9e;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease-in-out;
        }

        header {
            text-align: center;
            padding: 40px;
            background: var(--header-bg);
        }

        header h1 {
            font-family: 'Fira Code', monospace;
            font-size: 3rem;
            color: var(--primary-color);
        }

        header p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .controls button:hover {
            opacity: 0.9;
        }

        .theme-toggle {
            background: var(--primary-color);
            color: white;
        }

        .lang-toggle {
            background: #ff5722;
            color: white;
        }

        section {
            padding: 40px 20px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: var(--header-bg);
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body data-theme="dark" data-lang="en">
    <header>
        <h1 data-en="George Patiño" data-es="George Patiño">George Patiño</h1>
        <p data-en="Web & Mobile Developer | Tech Enthusiast | Entrepreneur" data-es="Desarrollador Web y Móvil | Entusiasta Tecnológico | Emprendedor">
            Web & Mobile Developer | Tech Enthusiast | Entrepreneur
        </p>
    </header>

    <div class="controls">
        <button class="theme-toggle">Toggle Theme</button>
        <button class="lang-toggle">Change Language</button>
    </div>

    <section class="hero">
        <h2 data-en="Hello there!" data-es="¡Hola!">Hello there!</h2>
        <p data-en="✨ I'm a passionate Web and Mobile Developer from Colombia. Obsessed with technology, motorcycles, and travel." 
           data-es="✨ Soy un apasionado desarrollador web y móvil de Colombia. Apasionado por la tecnología, las motocicletas y los viajes.">
            ✨ I'm a passionate Web and Mobile Developer from Colombia. Obsessed with technology, motorcycles, and travel.
        </p>
    </section>

    <footer>
        <p>&copy; 2024 <span data-en="George Patiño" data-es="George Patiño">George Patiño</span>. <span data-en="All Rights Reserved." data-es="Todos los derechos reservados.">All Rights Reserved.</span></p>
    </footer>

    <script>
        const themeToggle = document.querySelector('.theme-toggle');
        const langToggle = document.querySelector('.lang-toggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
        });

        langToggle.addEventListener('click', () => {
            const currentLang = body.dataset.lang;
            const newLang = currentLang === 'en' ? 'es' : 'en';
            body.dataset.lang = newLang;

            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.dataset[newLang];
            });
        });
    </script>
</body>
</html>
